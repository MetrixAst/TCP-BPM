{% extends 'site/base.html' %}
{% load static %}
{% load site_tags %}

{% block content %}
    <div class="d-flex justify-content-center">
        <div class="col-xl-6 mb-5">
            <div class="mx-auto">
                <form method="POST">
                    {% check_form form %}
                    {% csrf_token %}
                    <div class="card mb-5">
                        <div class="card-body">

                            <h1 class="mb-3 mt-1 pb-0 display-4">{{employee.user.get_name}}</h1>

                            <div class="row g-3 mt-2">
                                <div class="col-md-6">
                                    <label class="top-label">
                                        {{form.department}}
                                        <span>ОТДЕЛ</span>
                                    </label>
                                </div>
                                <div class="col-md-6">
                                    <label class="top-label">
                                        {{form.job_title}}
                                        <span>Должность</span>
                                    </label>
                                </div>
                            </div>

                            <div class="mt-3 position-relative tooltip-label-end form-group">
                                <div class="form-check">
                                    <label class="form-check-label">
                                        {{form.head}}
                                        Руководитель отдела
                                    </label>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end mt-3">
                                <button class="btn btn-icon btn-icon-end btn-primary" type="submit">
                                    <span>Сохранить</span>
                                    <i data-acorn-icon="chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
{% endblock %}
