<form method="POST" class="grid_outer mb-4" id="filter_form">
    {% csrf_token %}

    {% for field in form %}

        {% if field.field.widget.input_type == "hidden"%}
            {{ field }}
        {% else %}
            <div class="grid_child">
                {{field}}
            </div>
        {% endif %}
            
    {% endfor %}

    <button class="btn btn-icon btn-icon-end btn-primary" type="submit">
        <i data-acorn-icon="search"></i>
        <span>Поиск</span>
    </button>

</form>
