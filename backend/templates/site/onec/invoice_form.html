{% extends "site/base.html" %}
{% load static %}

{% block content %}
<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet">
<link rel="stylesheet" href="{% static 'site/css/apps/onec.css' %}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css">

<script>
  document.body.classList.add('onec-invoice-body');
</script>


<div class="onec-create-page">
  <form method="post" class="onec-create-card" id="onecInvoiceForm">
    {% csrf_token %}

    <div class="onec-create-card__header">
      <h1 class="onec-create-card__title">Новый счёт</h1>
      <a href="{% url 'onec:counterparty_list' %}" class="onec-create-card__close">×</a>
    </div>

    <div class="onec-create-card__section-title">Данные счёта</div>

    <div class="onec-form-grid">
      <div class="onec-form-field onec-form-field--full">
        <label class="onec-label">Контрагент<span>*</span></label>
        <select
          name="counterparty"
          id="cp_select"
          class="onec-select"
          data-url="{% url 'onec:counterparty_search_api' %}"
          data-detail-base="/onec/api/counterparties/"
          required
        ></select>
      </div>

      <div class="onec-form-field">
        <label class="onec-label">Дата счёта</label>
        <input type="text" name="invoice_date" class="onec-input onec-date-input" placeholder="дд.мм.гггг" autocomplete="off">
      </div>

      <div class="onec-form-field">
        <label class="onec-label">Код назначения платежа</label>
        <input type="text" name="payment_code" class="onec-input" placeholder="КНП">
      </div>

      <div class="onec-form-field onec-form-field--full">
        <label class="onec-label">Назначение платежа</label>
        <textarea name="comment" class="onec-textarea" placeholder="Назначение платежа / комментарий к счёту"></textarea>
      </div>
    </div>

    <div class="onec-preview-grid" id="counterpartyPreview" hidden>
      <div class="onec-preview-card">
        <div class="onec-preview-card__title">Банковские реквизиты</div>
        <div class="onec-preview-card__body" id="bankAccountsPreview">—</div>
      </div>

      <div class="onec-preview-card">
        <div class="onec-preview-card__title">Договоры</div>
        <div class="onec-preview-card__body" id="contractsPreview">—</div>
      </div>
    </div>

    <div class="onec-create-card__section-title onec-create-card__section-title--items">
      Позиции счёта
    </div>

    <div class="onec-invoice-head">
      <button type="button" class="onec-btn onec-btn--light" id="addRow">
        <i class="bi bi-plus-lg"></i>
        Добавить позицию
      </button>
    </div>

    <div class="onec-items-list" id="itemsTable">
      <div class="onec-items-list__head">
        <div>Наименование</div>
        <div>Кол-во</div>
        <div>Цена</div>
        <div>Итого</div>
        <div></div>
      </div>

      <div class="onec-items-list__body">
        <div class="onec-items-row">
          <input type="text" name="item_name[]" class="onec-input" placeholder="Товар или услуга" required>
          <input type="number" name="item_qty[]" class="onec-input onec-item-qty" value="1" step="0.1" min="0" required>
          <input type="number" name="item_price[]" class="onec-input onec-item-price" value="0" step="0.01" min="0" required>
          <div class="onec-item-total">0.00</div>
          <div></div>
        </div>
      </div>
    </div>

    <div class="onec-invoice-summary">
      <span>Итого:</span>
      <strong id="invoiceTotal">0.00</strong>
    </div>

    <div class="onec-create-footer">
      <a href="{% url 'onec:counterparty_list' %}" class="onec-btn onec-btn--ghost">Отменить</a>
      <button type="submit" class="onec-btn onec-btn--primary">Создать</button>
    </div>
  </form>
</div>

{% block scripts %}
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ru.min.js"></script>
<script src="{% static 'site/js/apps/onec.js' %}?v=4"></script>
{% endblock %}
{% endblock %}
