{% extends 'site/base.html' %}
{% load static %}
{% load site_tags %}

{% block content %}
    <div class="d-flex justify-content-center">
        <div class="col-xl-6 mb-5">
            <div class="mx-auto">
                <form method="POST">
                    {% check_form form %}
                    {% csrf_token %}
                    <div class="card mb-5">
                        <div class="card-body">

                            <h1 class="mb-3 mt-1 pb-0 display-4">Новая задача</h1>
                            <div class="row g-3">
                                <div class="col-md-9">
                                    <label class="top-label">
                                        {{ form.title }}
                                        <span>ЗАГОЛОВОК</span>
                                    </label>
                                </div>
                                <div class="col-md-3">
                                    <label class="top-label">
                                        {{ form.deadline }}
                                        <span>СРОК</span>
                                    </label>
                                </div>
                            </div>

                            <div class="row g-3 mt-3">
                                <div class="col">
                                    <div class="top-label">
                                        {{ form.text }}
                                        <span>ТЕКСТ</span>
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mt-3">
                                <div class="col-md-6">
                                    <div class="w-100">
                                        <label class="form-label">Исполнитель</label>
                                        {{ form.executor }}
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="w-100">
                                        <label class="form-label">Приоритет</label>
                                        {{ form.priority }}
                                    </div>
                                </div>
                            </div>

                            <div class="row g-3 mt-2">
                                <div class="col-md-6">
                                    <div class="w-100">
                                        <label class="form-label">Соисполнители</label>
                                        {{ form.co_executors }}
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="w-100">
                                        <label class="form-label">Наблюдатели</label>
                                        {{ form.observers }}
                                    </div>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end mt-3">
                                <button class="btn btn-icon btn-icon-end btn-primary" type="submit">
                                    <span>Сохранить</span>
                                    <i data-acorn-icon="chevron-right"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
        
    </div>
{% endblock %}
